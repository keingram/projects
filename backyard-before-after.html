<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Before &amp; After</title>
<style>
  :root { --accent:#ffffff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:#1c1f24; color:#e9ecf1; display:flex; flex-direction:column; align-items:center;
         min-height:100vh; padding:28px 16px; }
  h1 { font-weight:600; font-size:20px; letter-spacing:.2px; margin:0 0 4px; }
  p.sub { margin:0 0 20px; color:#9aa3af; font-size:13px; }
  .ba { position:relative; width:min(100%,900px); aspect-ratio:1024 / 682; border-radius:12px; overflow:hidden;
         box-shadow:0 12px 40px rgba(0,0,0,.45); user-select:none; touch-action:none; cursor:ew-resize; }
  .ba img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
  .after-wrap { position:absolute; inset:0; }
  .before-wrap { position:absolute; inset:0; clip-path:inset(0 50% 0 0); }
  .tag { position:absolute; bottom:14px; padding:5px 11px; font-size:12px; font-weight:600; letter-spacing:.4px;
          background:rgba(0,0,0,.55); color:#fff; border-radius:999px; backdrop-filter:blur(2px); }
  .tag.before { left:14px; }
  .tag.after  { right:14px; }
  .divider { position:absolute; top:0; bottom:0; width:2px; background:var(--accent); left:50%; transform:translateX(-1px);
              box-shadow:0 0 0 1px rgba(0,0,0,.25); }
  .grip { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:42px; height:42px; border-radius:50%;
           background:var(--accent); box-shadow:0 2px 10px rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; }
  .grip:before, .grip:after { content:""; border:6px solid transparent; }
  .grip:before { border-right-color:#3a3f47; margin-right:3px; }
  .grip:after  { border-left-color:#3a3f47; margin-left:3px; }
  .hint { margin-top:16px; color:#7e8794; font-size:12px; }
</style>
</head>

<script>
  const ba=document.getElementById('ba'), beforeWrap=document.getElementById('beforeWrap'), divider=document.getElementById('divider');
  let dragging=false;
  function setPos(clientX){
    const r=ba.getBoundingClientRect();
    let p=(clientX-r.left)/r.width; p=Math.max(0,Math.min(1,p));
    const pct=p*100;
    beforeWrap.style.clipPath='inset(0 '+(100-pct)+'% 0 0)';
    divider.style.left=pct+'%';
  }
  ba.addEventListener('pointerdown',e=>{dragging=true; ba.setPointerCapture(e.pointerId); setPos(e.clientX);});
  ba.addEventListener('pointermove',e=>{ if(dragging) setPos(e.clientX); });
  ba.addEventListener('pointerup',()=>dragging=false);
  ba.addEventListener('pointercancel',()=>dragging=false);
  setPos(ba.getBoundingClientRect().left + ba.getBoundingClientRect().width*0.5);
</script>
